<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>Page Title (Keep under 60 characters)</title>
    <meta name="description" content="A brief, keyword-rich summary of your page (150-160 characters).">
    <link rel="canonical" href="https://example.com/page-url">

    <meta property="og:title" content="Page Title for Social Media">
    <meta property="og:description" content="Engaging summary for social shares.">
    <meta property="og:image" content="https://example.com/image.jpg">
    <meta property="og:url" content="https://example.com/page-url">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="#home">Home</a></li>
                <li><a href="#about">About</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">
        <article>
            <h1>The Main Heading of Your Page</h1>
            <p>Your content goes here. Use semantic tags like &lt;section&gt;, &lt;aside&gt;, and &lt;figure&gt;.</p>
        </article>
    </main>

    <footer>
        <p>&copy; 2026 Your Company. All rights reserved.</p>
    </footer>

    <script src="main.js" defer></script>
</body>
</html>
